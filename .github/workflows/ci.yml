name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore LifeSim.slnx

      - name: Format check
        run: dotnet format LifeSim.slnx --verify-no-changes --no-restore

      # Note: no -warnaserror at the solution level — the Avalonia WASM toolchain emits a
      # benign NativeFileReference notice on non-AOT builds. Analyzers still run; the format
      # check above is the style gate.
      - name: Build (all projects)
        run: dotnet build LifeSim.slnx -c Release --no-restore

      - name: Test
        run: dotnet test LifeSim.slnx -c Release --no-build

      # Proves the single Avalonia app also builds for the browser/WASM target.
      # .NET 10's SDK ships the wasm build capability; if a runner lacks it,
      # add `- run: dotnet workload restore src/LifeSim.App.Browser` before this step.
      - name: Publish browser (WASM) demo
        run: dotnet publish src/LifeSim.App.Browser -c Release -o artifacts/wasm

      - name: Upload WASM demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifesim-wasm-demo
          path: artifacts/wasm/wwwroot
          if-no-files-found: warn

  # Packages a self-contained desktop build per platform (plus the WASM demo) and publishes them to a
  # single rolling "ci" pre-release, always replacing the previous one. Only on pushes to main.
  release:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # SkiaSharp (Avalonia's browser renderer) is a native library shipped as a NativeFileReference; the
      # WASM bundle only runs if the runtime is relinked to include libSkiaSharp (-p:WasmBuildNative=true
      # on the browser publish below), and that relink needs the wasm-tools workload / Emscripten toolchain.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      # Self-contained desktop builds (no .NET install needed by end users), cross-published from Linux.
      - name: Publish desktop (Windows x64)
        run: dotnet publish src/LifeSim.App.Desktop -c Release -r win-x64 --self-contained -o artifacts/desktop/win-x64

      - name: Publish desktop (Linux x64)
        run: dotnet publish src/LifeSim.App.Desktop -c Release -r linux-x64 --self-contained -o artifacts/desktop/linux-x64

      - name: Publish desktop (macOS arm64)
        run: dotnet publish src/LifeSim.App.Desktop -c Release -r osx-arm64 --self-contained -o artifacts/desktop/osx-arm64

      # -p:WasmBuildNative=true relinks the runtime so libSkiaSharp is compiled into dotnet.native.wasm;
      # without it SkiaSharp throws a TypeInitialization error at runtime in the browser.
      - name: Publish browser (WASM) demo
        run: dotnet publish src/LifeSim.App.Browser -c Release -p:WasmBuildNative=true -o artifacts/wasm

      - name: Package zips
        run: |
          mkdir -p dist
          (cd artifacts/desktop/win-x64 && zip -qr - .) > dist/LifeSim-win-x64.zip
          (cd artifacts/desktop/linux-x64 && zip -qr - .) > dist/LifeSim-linux-x64.zip
          (cd artifacts/desktop/osx-arm64 && zip -qr - .) > dist/LifeSim-osx-arm64.zip
          (cd artifacts/wasm/wwwroot && zip -qr - .) > dist/LifeSim-wasm-demo.zip
          ls -lh dist

      # Delete the existing rolling release (and its tag) if present, then recreate it fresh.
      - name: Replace the CI release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete ci --cleanup-tag --yes || echo "No existing 'ci' release to delete."
          gh release create ci dist/*.zip \
            --target "$GITHUB_SHA" \
            --latest \
            --title "CI build (latest main)" \
            --notes "Rolling build of the latest \`main\` (commit ${GITHUB_SHA:0:7}). Download the zip for your OS, unzip, and run LifeSim. Replaced on every push to main."

  # Publishes the WASM demo to GitHub Pages (the live, no-install browser demo). The app is
  # single-threaded, so it needs no COOP/COEP headers — plain static hosting works, and every asset is
  # referenced relatively so it runs fine from the project sub-path (user.github.io/<repo>/).
  deploy-pages:
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # SkiaSharp (Avalonia's browser renderer) is a native library; the WASM bundle only runs if the
      # runtime is relinked to include libSkiaSharp (-p:WasmBuildNative=true below), which needs this workload.
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Publish browser (WASM) demo
        run: dotnet publish src/LifeSim.App.Browser -c Release -p:WasmBuildNative=true -o artifacts/wasm

      # Pages runs Jekyll by default, which strips underscore-prefixed dirs — but the .NET runtime lives
      # in _framework/. .nojekyll disables that so the runtime is served intact.
      - name: Disable Jekyll
        run: touch artifacts/wasm/wwwroot/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wasm/wwwroot

      - name: Deploy to Pages
        id: deploy
        uses: actions/deploy-pages@v4
